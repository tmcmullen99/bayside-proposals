# .github/workflows/scheduled-tasks.yml
# Bayside Portal scheduled tasks
#
# Originally Sprints 12C + 15. After discovering pg_cron already runs the nurture
# pipeline (nurture-daily-run @ 23:00 UTC, nurture-send-batch @ 23:05 UTC), the
# nurture leg of this workflow was removed. Only the morning digest remains —
# it's a genuinely new feature that pg_cron isn't doing.
#
# Required GitHub Actions secrets:
#   BAYSIDE_CRON_SECRET — must match the env var of the same name in Cloudflare Pages.

name: Bayside Portal scheduled tasks

on:
  schedule:
    # Daily digest — weekdays at 15:00 UTC (8am PDT / 7am PST)
    - cron: '0 15 * * 1-5'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run'
        type: choice
        required: true
        default: 'daily_digest'
        options:
          - daily_digest

jobs:
  daily_digest:
    name: Send daily digest
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin-daily-digest
        run: |
          response=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X POST \
            -H "x-bayside-cron-secret: ${{ secrets.BAYSIDE_CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://portal-baysidepavers.com/api/admin-daily-digest)
          echo "$response"
          status=$(echo "$response" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          if [ "$status" != "200" ]; then
            echo "::error::Daily digest returned HTTP $status"
            exit 1
          fi
