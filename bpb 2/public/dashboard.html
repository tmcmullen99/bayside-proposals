<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard · Bayside Proposal Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="topbar">
  <a href="/" class="topbar-brand">
    <img src="https://cdn.prod.website-files.com/65a1ca4354f63bd7376b5027/69a04f4369bc9cc20b8d2155_BaysidePavers_original%20(2)%20(1).png" alt="Bayside Pavers" class="topbar-logo">
    <span class="brand-text">
      <span class="brand-title">Proposal Builder</span>
      <span class="brand-sub">dashboard</span>
    </span>
  </a>
  <nav class="topbar-actions">
    <a href="/">Home</a>
  </nav>
</header>

<main class="page">
  <div class="flex-between mb-8">
    <div>
      <span class="eyebrow">Projects</span>
      <h1 class="mt-2">All proposals</h1>
    </div>
    <button id="newProposalBtn" class="btn primary">+ New proposal</button>
  </div>

  <div id="errorBox"></div>
  <div id="content" class="loading">Loading proposals…</div>
</main>

<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
