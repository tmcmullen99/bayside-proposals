<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Dashboard · Bayside Client Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #5d7e69;
      --green-dark: #4a6654;
      --green-soft: #e8eee9;
      --charcoal: #353535;
      --tan: #dad7c5;
      --cream: #faf8f3;
      --navy: #1a1f2e;
      --border: #e5e5e5;
      --muted: #666;
      --danger: #b04040;
      --warn-soft: #fff4d4;
      --warn-text: #7a5a10;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--charcoal);
      background: #fafafa;
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
    }
    a { color: var(--green-dark); }

    /* Header */
    .portal-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .portal-header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .portal-logo { font-size: 22px; line-height: 1; }
    .portal-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
    }
    .portal-name small {
      display: block;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .portal-header-actions {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 13px;
    }
    .portal-header-actions .user-email {
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .portal-header-actions .signout {
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 5px;
    }
    .portal-header-actions .signout:hover {
      background: #f0f0f0;
      color: var(--navy);
    }

    /* Shell */
    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    /* Hero */
    .hero {
      margin-bottom: 36px;
    }
    .hero h1 {
      font-size: 30px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .hero p {
      color: var(--muted);
      font-size: 15px;
    }

    /* Section */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-header h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
    }
    .section-header .count {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Proposal cards */
    .proposals-grid {
      display: grid;
      gap: 14px;
    }
    .proposal-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 26px;
      transition: all 0.15s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .proposal-card:hover {
      border-color: var(--green);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .proposal-card-info { flex: 1; min-width: 220px; }
    .proposal-card-address {
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .proposal-card-meta {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status-badge.draft { background: #f0f0f0; color: var(--muted); }
    .status-badge.sent { background: var(--green-soft); color: var(--green-dark); }
    .status-badge.viewed { background: var(--green-soft); color: var(--green-dark); }
    .status-badge.signed { background: var(--green); color: #fff; }
    .status-badge.in_progress { background: var(--warn-soft); color: var(--warn-text); }
    .status-badge.complete { background: var(--navy); color: #fff; }

    .btn {
      padding: 10px 18px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s ease;
    }
    .btn:hover { background: var(--green-dark); }
    .btn-secondary {
      background: #fff;
      color: var(--charcoal);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--cream);
      border-color: var(--green);
    }

    /* Empty state */
    .empty-state {
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 60px 32px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 38px; line-height: 1; margin-bottom: 14px; }
    .empty-state h3 {
      font-size: 17px;
      color: var(--navy);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .empty-state p { font-size: 14px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Admin preview banner */
    .admin-banner {
      background: var(--warn-soft);
      color: var(--warn-text);
      padding: 10px 18px;
      text-align: center;
      font-size: 13px;
      border-bottom: 1px solid var(--warn-text);
    }
    .admin-banner a {
      color: var(--warn-text);
      text-decoration: underline;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div id="adminBanner" class="admin-banner" style="display:none;">
  You're viewing the client dashboard as an admin preview. <a href="/admin/clients.html">Back to admin</a>
</div>

<header class="portal-header">
  <div class="portal-header-brand">
    <div class="portal-logo">🧱</div>
    <div class="portal-name">
      Bayside Client Portal
      <small>Your project hub</small>
    </div>
  </div>
  <div class="portal-header-actions">
    <span class="user-email" id="userEmail"></span>
    <button class="signout" id="signOutBtn">Sign out</button>
  </div>
</header>

<main class="shell">
  <div id="loadingState" class="loading">
    <div class="loading-spinner"></div>
    <div>Loading your dashboard…</div>
  </div>

  <div id="contentState" style="display:none;">
    <div class="hero">
      <h1 id="welcomeTitle">Welcome back</h1>
      <p id="welcomeSubtitle">Here's the latest on your projects with Bayside Pavers.</p>
    </div>

    <div class="section-header">
      <h2>Your Proposals</h2>
      <span class="count" id="proposalsCount"></span>
    </div>

    <div id="proposalsGrid" class="proposals-grid"></div>
  </div>
</main>

<script type="module" src="/client/client-dashboard.js"></script>

</body>
</html>
