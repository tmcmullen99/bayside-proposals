<svg viewBox="0 0 980 680" xmlns="http://www.w3.org/2000/svg" font-family="'Onest', -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <pattern id="soil" width="28" height="24" patternUnits="userSpaceOnUse">
      <rect width="28" height="24" fill="#8c7a62"/>
      <path d="M3 7 q3 -3 6 0" stroke="#71604a" stroke-width="1.2" fill="none" opacity="0.5"/>
      <path d="M15 19 q2.5 -2.5 5 0" stroke="#71604a" stroke-width="1" fill="none" opacity="0.42"/>
      <circle cx="19" cy="11" r="1.7" fill="#6c5b45" opacity="0.55"/><circle cx="7" cy="17" r="1.1" fill="#6c5b45" opacity="0.5"/>
    </pattern>
    <pattern id="gravel" width="22" height="20" patternUnits="userSpaceOnUse">
      <rect width="22" height="20" fill="#c5c5b8"/>
      <circle cx="5" cy="5" r="3" fill="#aeae9f"/><circle cx="15" cy="9" r="3.4" fill="#b7b7a8"/>
      <circle cx="9" cy="15" r="3" fill="#a9a99a"/><circle cx="19" cy="16" r="2.4" fill="#b7b7a8"/><circle cx="1" cy="14" r="2.2" fill="#b0b0a2"/>
    </pattern>
  </defs>

  <rect width="980" height="680" fill="#faf8f3"/>
  <rect x="24" y="24" width="932" height="632" fill="none" stroke="#e3ddcd" stroke-width="1"/>

  <text x="70" y="62" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12.5" letter-spacing="3" fill="#5d7e69" font-weight="600">BAYSIDE · HOW WE BUILD IT</text>
  <text x="69" y="100" font-family="'Playfair Display', Georgia, serif" font-size="33" fill="#353535" font-weight="600">Anatomy of a segmental retaining wall</text>
  <line x1="70" y1="120" x2="600" y2="120" stroke="#d8d1bf" stroke-width="1.5"/>

  <!-- ground masses -->
  <rect x="70" y="460" width="530" height="80" fill="url(#soil)"/>
  <polygon points="372,300 600,282 600,540 372,540" fill="url(#soil)"/>
  <!-- front + retained grade lines -->
  <line x1="70" y1="460" x2="280" y2="460" stroke="#5f6f4f" stroke-width="2"/>
  <line x1="372" y1="300" x2="600" y2="282" stroke="#5f6f4f" stroke-width="2"/>
  <g stroke="#6f8f5a" stroke-width="2">
    <line x1="110" y1="460" x2="106" y2="452"/><line x1="150" y1="460" x2="146" y2="452"/><line x1="190" y1="460" x2="186" y2="452"/>
    <line x1="430" y1="296" x2="426" y2="288"/><line x1="490" y1="291" x2="486" y2="283"/><line x1="550" y1="287" x2="546" y2="279"/>
  </g>

  <!-- leveling pad -->
  <rect x="250" y="479" width="122" height="26" fill="url(#gravel)"/>
  <!-- drainage chimney -->
  <rect x="392" y="300" width="48" height="179" fill="url(#gravel)"/>

  <!-- geogrid -->
  <g stroke="#5d7e69" stroke-width="1.4" stroke-dasharray="9 5">
    <line x1="300" y1="355" x2="560" y2="349"/>
    <line x1="346" y1="417" x2="560" y2="412"/>
  </g>
  <g stroke="#5d7e69" stroke-width="1">
    <line x1="360" y1="350" x2="360" y2="360"/><line x1="430" y1="349" x2="430" y2="359"/><line x1="500" y1="348" x2="500" y2="358"/>
    <line x1="410" y1="412" x2="410" y2="422"/><line x1="490" y1="411" x2="490" y2="421"/>
  </g>

  <!-- SRW blocks (battered into the slope) -->
  <g stroke="#a89e84" stroke-width="1.5">
    <rect x="280" y="448" width="80" height="31" fill="#c7bfa9"/>
    <rect x="286" y="417" width="80" height="31" fill="#c7bfa9"/>
    <rect x="292" y="386" width="80" height="31" fill="#c7bfa9"/>
    <rect x="298" y="355" width="80" height="31" fill="#c7bfa9"/>
    <rect x="304" y="324" width="80" height="31" fill="#c7bfa9"/>
    <rect x="310" y="293" width="80" height="31" fill="#c7bfa9"/>
  </g>
  <!-- cap -->
  <rect x="302" y="268" width="92" height="25" fill="#bcae8f" stroke="#a89e84" stroke-width="1.5"/>

  <!-- perforated drain pipe + daylight stub -->
  <g stroke="#5b5b53" stroke-width="2" fill="none"><line x1="392" y1="465" x2="276" y2="470"/><line x1="392" y1="473" x2="276" y2="478"/></g>
  <circle cx="412" cy="468" r="10" fill="#6f6f66" stroke="#4f4f47" stroke-width="1.5"/>
  <g fill="#cdcdc4"><circle cx="408" cy="465" r="1.3"/><circle cx="416" cy="465" r="1.3"/><circle cx="412" cy="470" r="1.3"/></g>

  <!-- labels -->
  <g stroke="#5d7e69" stroke-width="1.1" fill="none">
    <path d="M348 276 L612 158"/>
    <path d="M386 402 L612 240"/>
    <path d="M520 349 L612 332"/>
    <path d="M422 432 L612 418"/>
    <path d="M372 492 L612 500"/>
    <path d="M566 332 L612 576"/>
  </g>
  <g fill="#5d7e69"><circle cx="348" cy="276" r="2.6"/><circle cx="386" cy="402" r="2.6"/><circle cx="520" cy="349" r="2.6"/><circle cx="422" cy="432" r="2.6"/><circle cx="372" cy="492" r="2.6"/><circle cx="566" cy="332" r="2.6"/></g>

  <text x="620" y="145" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">01</text>
  <text x="620" y="166" font-size="17" fill="#353535" font-weight="600">Cap units</text>
  <text x="620" y="186" font-size="13.5" fill="#6b6b63">Finished top course, adhered to shed water and</text>
  <text x="620" y="204" font-size="13.5" fill="#6b6b63">lock the wall's crown.</text>

  <text x="620" y="227" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">02</text>
  <text x="620" y="248" font-size="17" fill="#353535" font-weight="600">Segmental blocks, battered</text>
  <text x="620" y="268" font-size="13.5" fill="#6b6b63">Each course steps back into the slope so the</text>
  <text x="620" y="286" font-size="13.5" fill="#6b6b63">wall leans into what it holds.</text>

  <text x="620" y="313" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">03</text>
  <text x="620" y="334" font-size="17" fill="#353535" font-weight="600">Geogrid reinforcement</text>
  <text x="620" y="354" font-size="13.5" fill="#6b6b63">Layers tie the blocks into the soil mass so wall</text>
  <text x="620" y="372" font-size="13.5" fill="#6b6b63">and hillside act as one (taller walls).</text>

  <text x="620" y="399" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">04</text>
  <text x="620" y="420" font-size="17" fill="#353535" font-weight="600">Drainage rock + drain pipe</text>
  <text x="620" y="440" font-size="13.5" fill="#6b6b63">Washed gravel and a perforated pipe relieve</text>
  <text x="620" y="458" font-size="13.5" fill="#6b6b63">water pressure — the #1 cause of wall failure.</text>

  <text x="620" y="481" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">05</text>
  <text x="620" y="502" font-size="17" fill="#353535" font-weight="600">Compacted leveling pad</text>
  <text x="620" y="522" font-size="13.5" fill="#6b6b63">Crushed-rock base, dead level, that the first</text>
  <text x="620" y="540" font-size="13.5" fill="#6b6b63">buried course sits on.</text>

  <text x="620" y="563" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">06</text>
  <text x="620" y="584" font-size="17" fill="#353535" font-weight="600">Compacted backfill</text>
  <text x="620" y="603" font-size="13.5" fill="#6b6b63">Retained soil placed and compacted in</text>
  <text x="620" y="621" font-size="13.5" fill="#6b6b63">lifts behind the wall.</text>

  <text x="70" y="640" font-size="12.5" fill="#9a9384">Typical assembly. Wall height, geogrid spacing, and drainage are engineered per site — walls over ~3–4 ft generally require a permit and design.</text>
</svg>
