<svg viewBox="0 0 980 680" xmlns="http://www.w3.org/2000/svg" font-family="'Onest', -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <pattern id="soil" width="28" height="24" patternUnits="userSpaceOnUse">
      <rect width="28" height="24" fill="#8c7a62"/>
      <path d="M3 7 q3 -3 6 0" stroke="#71604a" stroke-width="1.2" fill="none" opacity="0.5"/>
      <circle cx="19" cy="11" r="1.7" fill="#6c5b45" opacity="0.55"/><circle cx="7" cy="17" r="1.1" fill="#6c5b45" opacity="0.5"/>
    </pattern>
    <pattern id="gravel" width="20" height="18" patternUnits="userSpaceOnUse">
      <rect width="20" height="18" fill="#c5c5b8"/>
      <circle cx="4" cy="5" r="3" fill="#aeae9f"/><circle cx="14" cy="8" r="3.4" fill="#b7b7a8"/><circle cx="8" cy="14" r="3" fill="#a9a99a"/>
    </pattern>
    <pattern id="lava" width="18" height="16" patternUnits="userSpaceOnUse">
      <rect width="18" height="16" fill="#5a4036"/>
      <circle cx="4" cy="4" r="3" fill="#6e4a3c"/><circle cx="12" cy="7" r="3.4" fill="#7a4f3f"/>
      <circle cx="7" cy="12" r="3" fill="#653f33"/><circle cx="16" cy="13" r="2.4" fill="#7a4f3f"/>
    </pattern>
  </defs>

  <rect width="980" height="680" fill="#faf8f3"/>
  <rect x="24" y="24" width="932" height="632" fill="none" stroke="#e3ddcd" stroke-width="1"/>

  <text x="70" y="62" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12.5" letter-spacing="3" fill="#5d7e69" font-weight="600">BAYSIDE · HOW WE BUILD IT</text>
  <text x="69" y="100" font-family="'Playfair Display', Georgia, serif" font-size="33" fill="#353535" font-weight="600">Anatomy of a gas fire pit</text>
  <line x1="70" y1="120" x2="540" y2="120" stroke="#d8d1bf" stroke-width="1.5"/>

  <!-- ground -->
  <rect x="70" y="470" width="470" height="78" fill="url(#soil)"/>
  <rect x="170" y="440" width="260" height="30" fill="url(#gravel)"/>
  <rect x="180" y="424" width="240" height="16" fill="#cdc8bb" stroke="#b3ad9e" stroke-width="1"/>

  <!-- flames -->
  <path d="M301 380 C 276 346 292 318 301 304 C 310 318 326 346 301 380 Z" fill="#e8862e" opacity="0.92"/>
  <path d="M289 380 C 274 354 284 336 289 326 C 295 338 304 358 289 380 Z" fill="#f2b134" opacity="0.92"/>
  <path d="M314 380 C 302 356 310 340 314 330 C 320 342 326 360 314 380 Z" fill="#f2b134" opacity="0.9"/>
  <path d="M301 380 C 292 360 298 346 301 338 C 305 346 311 360 301 380 Z" fill="#f7d96b"/>

  <!-- lava fill -->
  <rect x="250" y="382" width="102" height="38" fill="url(#lava)"/>
  <!-- burner pan + ring -->
  <rect x="256" y="416" width="90" height="8" fill="#9aa0a4"/>
  <ellipse cx="301" cy="408" rx="46" ry="6" fill="none" stroke="#8a9094" stroke-width="3"/>

  <!-- gas riser + shutoff -->
  <g stroke="#c9a23f" stroke-width="3.4" fill="none"><path d="M170 458 L301 458 L301 420"/></g>
  <circle cx="232" cy="458" r="7" fill="#faf8f3" stroke="#c9a23f" stroke-width="2.4"/>
  <line x1="232" y1="451" x2="232" y2="465" stroke="#c9a23f" stroke-width="2.4"/>

  <!-- pit walls (block courses) -->
  <g stroke="#a89e84" stroke-width="1.5">
    <rect x="200" y="396" width="46" height="28" fill="#bbac8e"/><rect x="200" y="368" width="46" height="28" fill="#bbac8e"/><rect x="200" y="340" width="46" height="28" fill="#bbac8e"/>
    <rect x="356" y="396" width="46" height="28" fill="#bbac8e"/><rect x="356" y="368" width="46" height="28" fill="#bbac8e"/><rect x="356" y="340" width="46" height="28" fill="#bbac8e"/>
  </g>
  <!-- air vent (slot in lower course) -->
  <rect x="214" y="406" width="20" height="10" fill="#5a544a"/>
  <!-- caps -->
  <rect x="194" y="326" width="58" height="16" fill="#ad9c7c" stroke="#9a8b6c" stroke-width="1.5"/>
  <rect x="350" y="326" width="58" height="16" fill="#ad9c7c" stroke="#9a8b6c" stroke-width="1.5"/>

  <!-- labels -->
  <g stroke="#5d7e69" stroke-width="1.1" fill="none">
    <path d="M408 334 L520 334 L580 172"/>
    <path d="M402 382 L520 382 L580 262"/>
    <path d="M347 408 L520 408 L580 352"/>
    <path d="M234 458 L520 458 L580 442"/>
    <path d="M420 432 L520 478 L580 520"/>
  </g>
  <g fill="#5d7e69"><circle cx="408" cy="334" r="2.6"/><circle cx="402" cy="382" r="2.6"/><circle cx="347" cy="408" r="2.6"/><circle cx="234" cy="458" r="2.6"/><circle cx="420" cy="432" r="2.6"/></g>

  <text x="588" y="167" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">01</text>
  <text x="588" y="188" font-size="17" fill="#353535" font-weight="600">Block wall + cap</text>
  <text x="588" y="208" font-size="13.5" fill="#6b6b63">Stacked, adhered units form the ring; a finished</text>
  <text x="588" y="226" font-size="13.5" fill="#6b6b63">cap gives a clean, heat-tolerant edge.</text>

  <text x="588" y="257" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">02</text>
  <text x="588" y="278" font-size="17" fill="#353535" font-weight="600">Air vents (required)</text>
  <text x="588" y="298" font-size="13.5" fill="#6b6b63">Gas pits must be ventilated so gas can't collect</text>
  <text x="588" y="316" font-size="13.5" fill="#6b6b63">inside the enclosure — a code, not a nicety.</text>

  <text x="588" y="347" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">03</text>
  <text x="588" y="368" font-size="17" fill="#353535" font-weight="600">Stainless burner &amp; ring</text>
  <text x="588" y="388" font-size="13.5" fill="#6b6b63">A corrosion-proof burner pan and ring distribute</text>
  <text x="588" y="406" font-size="13.5" fill="#6b6b63">the flame evenly under the media.</text>

  <text x="588" y="437" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">04</text>
  <text x="588" y="458" font-size="17" fill="#353535" font-weight="600">Gas supply + shutoff</text>
  <text x="588" y="478" font-size="13.5" fill="#6b6b63">Sealed, tested line with an accessible shutoff —</text>
  <text x="588" y="496" font-size="13.5" fill="#6b6b63">connected by a licensed installer.</text>

  <text x="588" y="515" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.5" fill="#5d7e69">05</text>
  <text x="588" y="536" font-size="17" fill="#353535" font-weight="600">Lava rock + base pad</text>
  <text x="588" y="555" font-size="13.5" fill="#6b6b63">Media hides the burner; the whole pit</text>
  <text x="588" y="573" font-size="13.5" fill="#6b6b63">rests on a compacted, level pad.</text>

  <text x="70" y="640" font-size="12.5" fill="#9a9384">Typical assembly. Gas work, clearances, and ventilation must meet code and be installed by a licensed professional.</text>
</svg>
