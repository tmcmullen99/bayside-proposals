<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor · Paver Portal Proposal Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Phase 1B.1 — picker link in sidebar footer.
       Class name .btn-link-tool to mirror the existing .btn-link-danger sibling. */
    .btn-link-tool {
      display: block;
      width: 100%;
      padding: 10px 0;
      background: none;
      border: none;
      border-bottom: 1px solid #eee;
      margin-bottom: 10px;
      text-align: left;
      font: inherit;
      font-size: 13px;
      color: #9c7440;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s ease;
    }
    .btn-link-tool:hover { color: #7d5c31; }
    .btn-link-tool[aria-disabled="true"] {
      color: #aaa;
      cursor: not-allowed;
      pointer-events: none;
    }
  </style>
</head>
<body>
<header class="topbar">
  <a href="/" class="topbar-brand">
    <img src="/assets/paver-portal-logo.svg" alt="Paver Portal" class="topbar-logo">
    <span class="brand-text">
      <span class="brand-title">Proposal Builder</span>
      <span class="brand-sub">editor</span>
    </span>
  </a>
  <nav class="topbar-actions">
    <span id="saveIndicator" class="save-indicator"></span>
    <a href="/dashboard">← Dashboard</a>
  </nav>
</header>
<div id="bootError"></div>
<div class="editor-layout" id="editorLayout" style="display:none;">
  <aside class="editor-sidebar">
    <div class="editor-breadcrumb">
      <span class="eyebrow">Proposal</span>
      <div class="editor-breadcrumb-title" id="projectTitle">Loading…</div>
    </div>
    <nav class="editor-nav" id="editorNav">
      <button data-section="project-info">
        <span class="nav-num">01</span>
        <span class="nav-label">Project info</span>
      </button>
      <button data-section="bid-pdf">
        <span class="nav-num">02</span>
        <span class="nav-label">Bid PDF</span>
      </button>
      <button data-section="bid-builder">
        <span class="nav-num">02·B</span>
        <span class="nav-label">Bid builder</span>
      </button>
      <button data-section="materials" class="active">
        <span class="nav-num">03</span>
        <span class="nav-label">Materials</span>
      </button>
      <button data-section="site-plan">
        <span class="nav-num">04</span>
        <span class="nav-label">Site plan</span>
      </button>
      <button data-section="photos">
        <span class="nav-num">05</span>
        <span class="nav-label">Photos</span>
      </button>
      <button data-section="export">
        <span class="nav-num">06</span>
        <span class="nav-label">Preview &amp; export</span>
      </button>
    </nav>
    <div class="editor-sidebar-footer">
      <a id="markupPdfPickerLink" class="btn-link-tool" aria-disabled="true">📥 Manage markup PDF →</a>
      <button id="deleteProposalBtn" class="btn-link-danger">Delete proposal</button>
    </div>
  </aside>
  <main class="editor-main">
    <div id="sectionContent"></div>
  </main>
</div>
<script>
  // Phase 1B.1 — wire the picker link to /admin/markup-pdf-picker.html?id=<current-proposal-id>.
  // Reads the same ?id= query param the editor itself uses; if none present, the link stays disabled.
  (function () {
    var id = new URLSearchParams(window.location.search).get('id');
    var link = document.getElementById('markupPdfPickerLink');
    if (link && id) {
      link.href = '/admin/markup-pdf-picker.html?id=' + encodeURIComponent(id);
      link.removeAttribute('aria-disabled');
    }
  })();
</script>
<script type="module" src="/js/editor.js"></script>
</body>
</html>
